name: Daily MLB Dashboard
# Runs every morning and on manual trigger. Free for public repos.
on:
  schedule:
    # 04:05 UTC = 12:05 AM ET — pull lines at midnight, before game-day public money.
    - cron: "5 4 * * *"
  workflow_dispatch: {}   # also run on-demand from the Actions tab
permissions:
  contents: write   # allow committing the generated page back to the repo
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests
      - name: Generate dashboard
        run: python run.py
      - name: Grade prior picks
        run: python grade.py || echo "grading skipped"
      - name: Add B divergence (today only, top of page)
        run: |
          D=$(grep -m1 -oE '^## [0-9]{4}-[0-9]{2}-[0-9]{2}' docs/PICKS.md | cut -d' ' -f2)
          python3 tools/b_unique.py docs/PICKS.md --markdown --date "$D" > /tmp/div.md || true
          if grep -qE '^\| (NEW|UPGRADE)' /tmp/div.md; then
            { echo "# ⚡ B Divergence — $D"; cat /tmp/div.md; echo ""; echo "---"; echo ""; cat docs/PICKS.md; } > /tmp/picks.md
            mv /tmp/picks.md docs/PICKS.md
