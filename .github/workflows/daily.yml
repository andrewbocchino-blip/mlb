
# Runs every morning and on manual trigger. Free for public repos.
on:
  schedule:
    # 04:05 UTC = 12:05 AM ET — pull lines at midnight, before game-day public money.
    # This timestamp-locks the picks at the overnight line so the midnight-line
    # theory can be tested honestly against results (closing line / final).
    - cron: "5 4 * * *"
  workflow_dispatch: {}   # also run on-demand from the Actions tab

permissions:
  contents: write   # allow committing the generated page back to the repo

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Generate dashboard
        run: python run.py

      - name: Commit and publish page
        run: |
          git config user.name "mlb-bot"
          git config user.email "mlb-bot@users.noreply.github.com"
          git add docs/index.html docs/locked_picks.jsonl
          git commit -m "Midnight pull $(date -u +%Y-%m-%d)" || echo "no changes"
          git push
